name: Update profile cards

# cron uses UTC time and standard 5-field cron syntax: minute hour day month weekday
# "0 0 * * *" = run once a day at 00:00 UTC.
# You can also trigger it manually from the Actions tab (workflow_dispatch),
# and it runs automatically whenever you push changes to config.json or the
# scripts, so you see results immediately instead of waiting for the next cron.
on:
  schedule:
    - cron: "0 13 * * *"   # 6:30 PM IST
  workflow_dispatch: {}
  push:
    paths:
      - "config.json"
      - "scripts/**"
      - "assets/ascii.gif"

# Needed so the workflow is allowed to push a commit back to the repo.
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pillow

      - name: Generate left card (ASCII portrait)
        run: python3 scripts/generate_left_card.py

      - name: Generate right card (info panel)
        run: python3 scripts/generate_right_card.py

      - name: Fetch contribution data (public page - no token needed)
        run: python3 scripts/fetch_contributions.py

      - name: Generate contribution heatmap SVG
        run: python3 scripts/generate_heatmap.py

      - name: Commit updated files if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/left_card.svg assets/right_card.svg assets/heatmap.svg data/contributions.json
          git diff --staged --quiet || git commit -m "chore: auto-update profile cards"
          git push